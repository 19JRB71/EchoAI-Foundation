kind = "api"
previewPath = "/"
title = "EchoAI"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "EchoAI"
paths = ["/"]

[services.env]
PORT = "8080"

[services.development]
run = "cd /home/runner/workspace/EchoAI && npm start"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd /home/runner/workspace/EchoAI && npm install && cd client && npm install && npm run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/EchoAI && npm start"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"
