# =============================================================================
# Railway deployment configuration for EchoAI
# =============================================================================
# EchoAI is a standalone Node/Express (CommonJS) app that lives in the EchoAI/
# subdirectory of this repository, so every command changes into EchoAI/ first.
#
# Railway runs two phases:
#   1. BUILD  - no database yet. Installs dependencies and builds the React SPA.
#   2. DEPLOY - DATABASE_URL and PORT are injected. Runs migrations, then starts.
#
# Database migrations run in the START command (not the build) because the
# database is only reachable at deploy time. The migration runner is idempotent
# (it tracks applied files in schema_migrations), so running it on every deploy
# is safe and a no-op once everything is applied.
# =============================================================================

[build]
builder = "nixpacks"
# Install server deps, then client deps, then build the SPA into
# EchoAI/client/dist. Any VITE_* vars (e.g. VITE_STRIPE_PUBLISHABLE_KEY) set on
# the Railway service are baked into the client bundle during this step.
buildCommand = "cd EchoAI && npm install && cd client && npm install && npm run build"

[deploy]
# Apply pending SQL migrations (idempotent) then start the Express server.
# server.js reads PORT (Railway injects it) and serves BOTH the /api routes and
# the built React SPA from client/dist on a single origin.
startCommand = "cd EchoAI && npm run migrate && node server.js"
# Railway hits this public endpoint to confirm the app is live before routing
# traffic to a new deploy.
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
