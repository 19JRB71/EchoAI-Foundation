    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#04070d"/>
  <g filter="url(#glow)">
    <rect x="118" y="128" width="276" height="56" rx="10" fill="url(#bar)"/>
    <rect x="118" y="228" width="276" height="56" rx="10" fill="url(#bar)"/>
    <rect x="118" y="328" width="276" height="56" rx="10" fill="url(#bar)"/>
