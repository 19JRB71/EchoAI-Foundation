  <rect x="118" y="130" width="276" height="6" rx="3" fill="#bfe3ff" opacity="0.85"/>
  <rect x="118" y="230" width="276" height="6" rx="3" fill="#bfe3ff" opacity="0.85"/>
  <rect x="118" y="330" width="276" height="6" rx="3" fill="#bfe3ff" opacity="0.85"/>
