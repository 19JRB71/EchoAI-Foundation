<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Helvetica, Arial, sans-serif">
  <!-- "Here's what you'll see" preview of Google's account chooser screen.
       Static app asset: update this illustration if Google changes its screens. -->
  <rect width="480" height="320" rx="12" fill="#0f1115"/>
  <!-- browser chrome -->
  <rect x="0" y="0" width="480" height="36" rx="12" fill="#1c1f26"/>
  <circle cx="20" cy="18" r="5" fill="#f16057"/>
  <circle cx="38" cy="18" r="5" fill="#f5bd4f"/>
  <circle cx="56" cy="18" r="5" fill="#57c454"/>
  <rect x="80" y="9" width="320" height="18" rx="9" fill="#2a2e37"/>
  <text x="94" y="22" font-size="11" fill="#9aa3b2">accounts.google.com</text>
  <!-- google card -->
  <rect x="90" y="58" width="300" height="230" rx="10" fill="#ffffff"/>
  <text x="240" y="92" font-size="18" text-anchor="middle">
    <tspan fill="#4285F4" font-weight="bold">G</tspan><tspan fill="#EA4335" font-weight="bold">o</tspan><tspan fill="#FBBC05" font-weight="bold">o</tspan><tspan fill="#4285F4" font-weight="bold">g</tspan><tspan fill="#34A853" font-weight="bold">l</tspan><tspan fill="#EA4335" font-weight="bold">e</tspan>
  </text>
  <text x="240" y="116" font-size="13" font-weight="bold" fill="#202124" text-anchor="middle">Choose an account</text>
  <text x="240" y="134" font-size="11" fill="#5f6368" text-anchor="middle">to continue to Zorecho</text>
  <!-- account row to click, highlighted -->
  <rect x="112" y="148" width="256" height="46" rx="8" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <rect x="116" y="152" width="248" height="38" rx="6" fill="#f8f9fa" stroke="#dadce0"/>
  <circle cx="136" cy="171" r="12" fill="#4285F4"/>
  <text x="136" y="176" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Y</text>
  <text x="156" y="168" font-size="11" font-weight="bold" fill="#202124">Your business account</text>
  <text x="156" y="182" font-size="10" fill="#5f6368">you@yourbusiness.com</text>
  <rect x="116" y="198" width="248" height="38" rx="6" fill="#ffffff" stroke="#dadce0"/>
  <circle cx="136" cy="217" r="12" fill="#9aa0a6"/>
  <text x="156" y="221" font-size="11" fill="#5f6368">Use another account</text>
  <!-- allow button hint -->
  <rect x="284" y="246" width="80" height="26" rx="6" fill="#1a73e8"/>
  <text x="324" y="263" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Allow</text>
  <!-- callout -->
  <path d="M 380 171 L 400 171" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 380 171 l 8 -5 v 10 z" fill="#f59e0b"/>
  <rect x="336" y="94" width="132" height="54" rx="8" fill="#f59e0b"/>
  <text x="402" y="112" font-size="11" font-weight="bold" fill="#1c1e21" text-anchor="middle">Pick the account</text>
  <text x="402" y="126" font-size="11" font-weight="bold" fill="#1c1e21" text-anchor="middle">your business uses,</text>
  <text x="402" y="140" font-size="11" font-weight="bold" fill="#1c1e21" text-anchor="middle">then press Allow</text>
</svg>
