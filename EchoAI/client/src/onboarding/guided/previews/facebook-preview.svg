<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Helvetica, Arial, sans-serif">
  <!-- "Here's what you'll see" preview of Facebook's login/consent screen.
       Static app asset: update this illustration if Facebook changes its screens. -->
  <rect width="480" height="320" rx="12" fill="#0f1115"/>
  <!-- browser chrome -->
  <rect x="0" y="0" width="480" height="36" rx="12" fill="#1c1f26"/>
  <circle cx="20" cy="18" r="5" fill="#f16057"/>
  <circle cx="38" cy="18" r="5" fill="#f5bd4f"/>
  <circle cx="56" cy="18" r="5" fill="#57c454"/>
  <rect x="80" y="9" width="320" height="18" rx="9" fill="#2a2e37"/>
  <text x="94" y="22" font-size="11" fill="#9aa3b2">facebook.com</text>
  <!-- facebook card -->
  <rect x="90" y="58" width="300" height="230" rx="10" fill="#ffffff"/>
  <circle cx="240" cy="96" r="20" fill="#1877f2"/>
  <text x="240" y="104" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">f</text>
  <text x="240" y="140" font-size="14" font-weight="bold" fill="#1c1e21" text-anchor="middle">Log in to Facebook</text>
  <rect x="120" y="156" width="240" height="26" rx="6" fill="#f0f2f5" stroke="#dddfe2"/>
  <text x="130" y="173" font-size="11" fill="#8a8d91">Email or phone number</text>
  <rect x="120" y="190" width="240" height="26" rx="6" fill="#f0f2f5" stroke="#dddfe2"/>
  <text x="130" y="207" font-size="11" fill="#8a8d91">Password</text>
  <!-- the button to press, highlighted -->
  <rect x="116" y="228" width="248" height="34" rx="8" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <rect x="120" y="232" width="240" height="26" rx="6" fill="#1877f2"/>
  <text x="240" y="249" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Log In</text>
  <!-- callout -->
  <path d="M 372 245 L 396 245" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 372 245 l 8 -5 v 10 z" fill="#f59e0b"/>
  <rect x="336" y="264" width="132" height="40" rx="8" fill="#f59e0b"/>
  <text x="402" y="281" font-size="11" font-weight="bold" fill="#1c1e21" text-anchor="middle">Sign in, then press</text>
  <text x="402" y="296" font-size="11" font-weight="bold" fill="#1c1e21" text-anchor="middle">this blue button</text>
</svg>
