# =============================================================================
# Nixpacks build recipe for EchoAI (Railway)
# =============================================================================
# Railway's default Node build ran `npm ci`, which crashed on Railway with
# "Exit handler never called!". This file replaces the auto-detected phases with
# an explicit, robust recipe:
#
#  * setup   - Node 20 (has prebuilt `bcrypt` binaries, so no native compile is
#              needed) plus python3/gcc/make as a fallback in case any native
#              dependency must build from source.
#  * install - server deps via `npm install` (not the crashing `npm ci`).
#  * build   - install the client's deps AND build the SPA in a SINGLE command.
#              Nixpacks only copies the root package.json into the install phase,
#              so the client/ source only exists from the build phase onward.
#              The install and build MUST run in one command: nixpacks runs each
#              cmd with an ephemeral cache mount, so a client `npm install` in
#              one cmd is not guaranteed to still be present in a later cmd -
#              chaining them with `&&` keeps node_modules in scope for the build.
#              The client's build tools (vite, tailwind, postcss) are regular
#              dependencies (not devDependencies), so a plain `npm install`
#              installs them even with NODE_ENV=production.
#
# The start command, health check, and restart policy live in railway.toml.
# =============================================================================

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["cd client && npm install && npm run build"]
