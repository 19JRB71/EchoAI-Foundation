# =============================================================================
# Nixpacks build recipe for EchoAI (Railway)
# =============================================================================
# Railway's default Node build ran `npm ci`, which crashed on Railway with
# "Exit handler never called!". This file replaces the auto-detected phases with
# an explicit, robust recipe:
#
#  * setup   - Node 20 (has prebuilt `bcrypt` binaries, so no native compile is
#              needed) plus python3/gcc/make as a fallback in case any native
#              dependency must build from source.
#  * install - server deps via `npm install` (not the crashing `npm ci`).
#  * build   - NO client build runs on Railway. Railway's builder crashes the
#              client's npm install with "npm error Exit handler never called!",
#              so instead the React SPA is built locally and its output
#              (client/dist) is committed to the repo (un-ignored in
#              EchoAI/.gitignore). Railway serves that prebuilt bundle directly.
#              This build phase only verifies the committed bundle is present.
#              NOTE: after ANY change under EchoAI/client/, rebuild with
#              `cd EchoAI/client && npm run build` and commit client/dist.
#
# The start command, health check, and restart policy live in railway.toml.
# =============================================================================

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
# The npm bundled with Node 20.x can crash on Railway with "Exit handler never
# called!" and "ENOTEMPTY ... rename node_modules/<pkg>" when it installs on top
# of an existing/partial node_modules (e.g. a restored build cache) or under
# memory pressure. When that happens npm exits without finishing, leaving
# node_modules HALF-installed (dotenv and others missing) — which is exactly why
# the app crashed at runtime with "Cannot find module 'dotenv'".
#
# Fix: (1) start from a clean node_modules so there is nothing to rename over,
# (2) serialize npm with --maxsockets=1 to avoid the rename race / reduce memory
# pressure, then (3) hard-verify the critical runtime deps actually landed. Step
# 3 turns a silent partial install into a LOUD build failure instead of shipping
# a broken image.
cmds = [
  "rm -rf node_modules",
  "npm install --no-audit --no-fund --maxsockets=1",
  "node -e \"require('dotenv');require('express');require('pg');require('bcrypt');console.log('runtime deps verified OK')\""
]

[phases.build]
cmds = ["test -f client/dist/index.html || (echo 'ERROR: client/dist is missing - run: cd EchoAI/client && npm run build, then commit client/dist' && exit 1)"]
